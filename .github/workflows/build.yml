name: Update JM Domains

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（北京时间 10:00）触发
  workflow_dispatch:        # 允许手动触发

jobs:
  update-domains:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 需要写权限来提交文件

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Fetch JM domains and build YAML
        id: fetch
        run: |
          set -euo pipefail

          PUB_URL="https://jmcomicgo.org"
          KEYWORDS=("jm" "comic")

          echo "Fetching ${PUB_URL} ..."
          HTML=$(curl -fsSL \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: zh-CN,zh;q=0.9" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            "${PUB_URL}")

          # 提取所有匹配 [\w-]+\.\w+/?\w+ 的字符串（与 JmcomicText.analyse_jm_pub_html 正则一致）
          ALL_DOMAINS=$(echo "${HTML}" | grep -oE '[A-Za-z0-9_-]+\.[A-Za-z0-9]+(/[A-Za-z0-9]+)?' || true)

          # 过滤：只保留含 'jm' 或 'comic' 的域名，去重，保留顺序
          FILTERED=$(echo "${ALL_DOMAINS}" | awk '
            !seen[$0]++ && (/jm/ || /comic/) { print }
          ')

          if [ -z "${FILTERED}" ]; then
            echo "::error::No domains found — aborting to avoid overwriting with an empty list."
            exit 1
          fi

          # 构建 YAML payload
          OUTPUT_FILE="${{ github.workspace }}/domain.txt"
          mkdir -p "$(dirname "${OUTPUT_FILE}")"

          {
            echo "payload:"
            while IFS= read -r domain; do
              echo "  - '${domain}'"
            done <<< "${FILTERED}"
          } > "${OUTPUT_FILE}"

          echo "Generated ${OUTPUT_FILE}:"
          cat "${OUTPUT_FILE}"

          # 传递文件路径给后续步骤
          echo "output_file=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OUTPUT_FILE="${{ steps.fetch.outputs.output_file }}"

          git add "${OUTPUT_FILE}"

          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
          else
            git commit -m "chore: update JM domains ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
            git push
          fi
